services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hime-server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Example: http://localhost:4000/api
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:4000/api}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:5173}
    container_name: hime-client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped
